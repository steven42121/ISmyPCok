name: Build and Publish Release

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (for manual runs)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-windows-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          if ([string]::IsNullOrWhiteSpace($tag)) { $tag = "${{ github.ref_name }}" }
          if ([string]::IsNullOrWhiteSpace($tag)) { $tag = "${{ inputs.tag }}" }
          if ([string]::IsNullOrWhiteSpace($tag)) {
            Write-Error "Cannot resolve release tag."
            exit 1
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Prepare third-party dependencies
        shell: pwsh
        run: ./scripts/fetch_3rd_party.ps1

      - name: Configure (Release)
        shell: pwsh
        run: cmake -S . -B build -A x64

      - name: Build binaries and tests
        shell: pwsh
        run: cmake --build build --config Release --target ispcok_cli ispcok_capi pc_benchmark ispcok_tests

      - name: Run tests
        shell: pwsh
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Sync generated README blocks
        shell: pwsh
        run: ./scripts/update_readme_generated.ps1

      - name: Assert generated docs are up to date
        shell: pwsh
        run: |
          $changed = git status --porcelain README.en.md README.zh-CN.md
          if (-not [string]::IsNullOrEmpty($changed)) {
            Write-Error "README generated blocks are out of date."
            exit 1
          }

      - name: Package artifacts
        id: package
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.tag }}"
          $assetRoot = "dist/ISmyPCok-$tag-windows-x64"
          New-Item -ItemType Directory -Path $assetRoot -Force | Out-Null

          Copy-Item "build/Release/ispcok_cli.exe" $assetRoot
          Copy-Item "build/Release/ispcok_capi.dll" $assetRoot
          Copy-Item "build/Release/pc_benchmark.exe" $assetRoot
          Copy-Item "build/Release/ispcok_tests.exe" $assetRoot

          Copy-Item "README.md" $assetRoot
          Copy-Item "README.en.md" $assetRoot
          Copy-Item "README.zh-CN.md" $assetRoot
          Copy-Item "LICENSE" $assetRoot
          Copy-Item "docs/*.md" $assetRoot
          Copy-Item "scripts/fetch_3rd_party.ps1" $assetRoot
          Copy-Item "scripts/update_readme_generated.ps1" $assetRoot

          New-Item -ItemType Directory -Path "$assetRoot/include/ispcok" -Force | Out-Null
          Copy-Item "include/ispcok/*.h" "$assetRoot/include/ispcok"

          $zipName = "ISmyPCok-$tag-windows-x64.zip"
          Compress-Archive -Path "$assetRoot/*" -DestinationPath $zipName -Force

          $hash = (Get-FileHash $zipName -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "$zipName.sha256" -Value "$hash  $zipName" -Encoding ascii

          "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            ${{ steps.package.outputs.zip_name }}
            ${{ steps.package.outputs.zip_name }}.sha256
