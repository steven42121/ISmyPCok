name: Check README Module List

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check-readme-module-list:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare third-party dependencies
        shell: pwsh
        run: ./scripts/fetch_3rd_party.ps1

      - name: Configure
        shell: pwsh
        run: cmake -S . -B build -A x64

      - name: Build CLI
        shell: pwsh
        run: cmake --build build --config Release --target ispcok_cli

      - name: Build Tests
        shell: pwsh
        run: cmake --build build --config Release --target ispcok_tests

      - name: Regenerate README generated blocks
        shell: pwsh
        run: ./scripts/update_readme_generated.ps1

      - name: CLI smoke tests
        shell: pwsh
        run: |
          .\build\Release\ispcok_cli.exe list-scenarios
          .\build\Release\ispcok_cli.exe run --scenario game_engine

      - name: Run unit tests
        shell: pwsh
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Assert README is up to date
        shell: pwsh
        run: |
          git diff -- README.md
          if (-not [string]::IsNullOrEmpty((git status --porcelain README.md))) {
            Write-Error "README.md generated blocks are out of date. Run ./scripts/update_readme_generated.ps1 and commit the result."
            exit 1
          }
